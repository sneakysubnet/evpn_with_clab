name: bridging-and-bum
topology:
  kinds:
    ceos:
      image: ceos:4.36.1F 
    linux:
      image: quay.io/frrouting/frr:10.5.4
  nodes:
    leaf1:
      kind: ceos 
      startup-config: leaf1.cfg
      binds:
        - /bum_with_her/capture:/tmp/
    leaf2:
      kind: ceos
      startup-config: leaf2.cfg
      binds:
        - /bum_with_her/capture:/tmp/
    leaf3:
      kind: ceos
      startup-config: leaf3.cfg
      binds:
        - /bum_with_her/capture:/tmp/
    leaf4:
      kind: ceos
      startup-config: leaf4.cfg
      binds:
        - /bum_with_her/capture:/tmp/
    spine1:
      kind: ceos
      startup-config: spine1.cfg
      binds:
        - /bum_with_her/capture:/tmp/ 
    host1:
      kind: linux
    host2:
      kind: linux
    host3:
      kind: linux
    host4:
      kind: linux

  links:
    - endpoints: ["spine1:eth1", "leaf1:eth11"]
    - endpoints: ["spine1:eth2", "leaf2:eth11"]
    - endpoints: ["spine1:eth3", "leaf3:eth11"]
    - endpoints: ["spine1:eth4", "leaf4:eth11"]

    - endpoints: ["leaf1:eth1", "host1:eth1"]
    - endpoints: ["leaf2:eth1", "host2:eth1"]
    - endpoints: ["leaf3:eth1", "host3:eth1"]
    - endpoints: ["leaf4:eth1", "host4:eth1"]
