name: routing-deep-dive
topology:
  kinds:
    ceos:
      image: ceos:4.36.1F 
    linux:
      image: quay.io/frrouting/frr:10.5.4
  nodes:
    leaf1:
      kind: ceos 
      startup-config: leaf1.cfg
      binds:
        - /routing_deep_dive/capture:/tmp/
    leaf2:
      kind: ceos
      startup-config: leaf2.cfg
      binds:
        - /routing_deep_dive/capture:/tmp/
    leaf3:
      kind: ceos
      startup-config: leaf3.cfg
      binds:
        - /routing_deep_dive/capture:/tmp/
    leaf4:
      kind: ceos
      binds:
        - /routing_deep_dive/capture:/tmp/
    spine1:
      kind: ceos
      startup-config: spine1.cfg
      binds:
        - /routing_deep_dive/capture:/tmp/ 
    host1:
      kind: linux
      exec:
        - ip link set dev eth1 address 00:aa:aa:aa:aa:aa
        - ip a a 10.10.10.10/24 dev eth1
        - ip r r default via 10.10.10.1 dev eth1
    host2:
      kind: linux
      exec:
        - ip link set dev eth1 address 00:bb:bb:bb:bb:bb
        - ip a a 10.20.20.20/24 dev eth1
        - ip r r default via 10.20.20.1 dev eth1
    host3:
      kind: linux
      exec:
        - ip link set dev eth1 address 00:cc:cc:cc:cc:cc
        - ip a a 10.10.10.30/24 dev eth1
        - ip r r default via 10.10.10.1 dev eth1
    host4:
      kind: linux
      exec:
        - ip link set dev eth1 address 00:dd:dd:dd:dd:dd
        - ip a a 10.20.20.40/24 dev eth1
        - ip r r default via 10.20.20.1 dev eth1
    host5:
      kind: linux
      exec:
        - ip link set dev eth1 address 00:ee:ee:ee:ee:ee
        - ip a a 10.30.30.50/24 dev eth1
        - ip r r default via 10.30.30.1 dev eth1
    host6:
      kind: linux
      exec:
        - ip link set dev eth1 address 00:ff:ff:ff:ff:ff
        - ip a a 10.40.40.60/24 dev eth1
        - ip r r default via 10.40.40.1 dev eth1
    host7:
      kind: linux
      exec:
        - ip link set dev eth1 address 00:77:77:77:77:77
        - ip a a 10.40.40.70/24 dev eth1
        - ip r r default via 10.40.40.1 dev eth1


  links:
    - endpoints: ["spine1:eth1", "leaf1:eth11"]
    - endpoints: ["spine1:eth2", "leaf2:eth11"]
    - endpoints: ["spine1:eth3", "leaf3:eth11"]
    - endpoints: ["spine1:eth4", "leaf4:eth11"]

    - endpoints: ["leaf1:eth1", "host1:eth1"]
    - endpoints: ["leaf1:eth2", "host2:eth1"]
    - endpoints: ["leaf1:eth3", "host5:eth1"]
    - endpoints: ["leaf2:eth1", "host3:eth1"]
    - endpoints: ["leaf2:eth2", "host4:eth1"]
    - endpoints: ["leaf2:eth3", "host6:eth1"]
    - endpoints: ["leaf3:eth1", "host7:eth1"]
